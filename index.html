<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Люблю тебя родная ❤</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;    /* убираем прокрутку */
            background: #000;     /* чёрный фон для полос */
        }

        .video-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        video {
            width: 100%;
            height: 100%;
            display: block;
        }

        /* 
        По умолчанию (широкие экраны — ПК, ноутбуки, телефоны в landscape):
        видео вписывается полностью, с чёрными полосами, если пропорции не совпадают.
        */
        video {
            object-fit: contain;
        }

        /* 
        Для узких экранов (телефон в портретной ориентации):
        заполняем весь экран, обрезая края видео при необходимости.
        Пороговое значение 768px можно подстроить под своё видео,
        либо использовать orientation: portrait (поддерживается хорошо).
        */
        @media (orientation: portrait) {
            video {
                object-fit: cover;
            }
        }

        /* Стили для кнопки включения звука (изначально скрыта) */
        .sound-btn {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            padding: 12px 28px;
            font-size: 18px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            border: 2px solid white;
            border-radius: 30px;
            cursor: pointer;
            backdrop-filter: blur(6px);
            transition: background 0.2s;
            display: none;        /* скрыта по умолчанию */
        }

        .sound-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .sound-btn.visible {
            display: block;
        }
    </style>
</head>
<body>
    <div class="video-container">
        <!-- 
            loop        – зацикливание
            playsinline – разрешает inline-воспроизведение на iOS
            preload     – начинаем загрузку заранее
            muted УБРАН – пробуем автовоспроизведение со звуком
        -->
        <video id="myVideo" loop playsinline preload="auto">
            <!-- Укажите имя вашего видеофайла (должен лежать в той же папке) -->
            <source src="gift.mp4" type="video/mp4">
            Ваш браузер не поддерживает видео.
        </video>
    </div>

    <button id="soundButton" class="sound-btn">🔊 Включить звук</button>

    <script>
        window.addEventListener('load', function() {
            const video = document.getElementById('myVideo');
            const soundBtn = document.getElementById('soundButton');

            // Пытаемся запустить воспроизведение со звуком
            const playPromise = video.play();

            if (playPromise !== undefined) {
                playPromise
                    .then(() => {
                        // Всё хорошо — видео играет со звуком, кнопка не нужна
                        console.log('Видео воспроизводится со звуком');
                    })
                    .catch(error => {
                        // Автовоспроизведение заблокировано — скорее всего на мобильном или из-за отсутствия жеста
                        console.warn('Автовоспроизведение заблокировано:', error);
                        // Показываем кнопку включения звука
                        soundBtn.classList.add('visible');

                        // Запускаем видео без звука, чтобы хотя бы картинка шла
                        video.muted = false;
                        video.play().catch(e => console.warn('Не удалось запустить даже без звука:', e));
                    });
            }

            // Обработчик клика по кнопке: включаем звук и перезапускаем видео
            soundBtn.addEventListener('click', function() {
                video.play();                 // повторный вызов play с unmuted после жеста разрешён
                soundBtn.classList.remove('visible'); // скрываем кнопку
            });
        });
    </script>
</body>
</html>
